  <!-- ₡ serigraphy on right arm -->
  <text x="330" y="238" dominant-baseline="central" text-anchor="middle"
    font-family="Georgia, serif" font-size="72" font-weight="700"
    fill="#1a1530" opacity="0.65" transform="rotate(-27, 330, 238)">₡</text>
  <!-- Die at vertex (3 face) -->
