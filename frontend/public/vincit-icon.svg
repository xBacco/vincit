    fill="#1a1530" stroke="#c4a878" stroke-width="5"/>
  <circle cx="268" cy="369" r="7" fill="#c4a878"/>
  <circle cx="256" cy="388" r="7" fill="#c4a878"/>
  <circle cx="244" cy="407" r="7" fill="#c4a878"/>
